<body>
  <h1>Please complete our survey</h1>
  <form name="myform" action="form_result.htm" method="get">

    <h2>Contact information</h2>
    <label for="email">Email address:</label>
    <input type="email" name="email" id="email" required placeholder="XXXXXX@email.com" title="Must be a valid email address"><br>

    <label for="password"> Password:</label>
    <input type="password" name="password" id="password" autofocus required><br>

    <label for="phone"> Phone Number:</label>
    <input type="phone" name="phone" id="phone" autofocus required><br>

    <label for="firstname">First name:</label>
    <input type="text" name="firstname" id="firstname" required><br>

    <label for="lastname">Last name:</label>
    <input type="text" name="lastname" id="lastname" required><br>

    <label for="date"> Date:</label>
    <input type="date" name="date" required placeholder="Month/Day/Year" id="date" autofocus required><br>

    <h2>Geographic information</h2>
    <label for="state">State:</label>

    <option value="MT">Montana</option>

    <option value="NY">New York</option>

    <br>

    <label for="city">City:</label>
    <input type="city" name="city" id="city" autofocus required><br>

    <label for="zip">Zip code:</label>
    <input type="text" name="zip" id="zip" required placeholder="Five digits"
           pattern="\d{5}" title="Must be XXXXX"><br>
    
    <label for="address">Home Address:</label>
    <input type="address" name="address" id="address" autofocus required><br>

    <h2>How did you hear about us?</h2>
    <input type="checkbox" name="web" id="web" value="web">
    <label for="web">Web search:</label><br>

    <input type="checkbox" name="facebook" id="facebook" value="facebook">

    <h2>Thank you for taking our survey.</h2>
    <input type="submit" name="register" id="button" value="Submit">
